base:
  - template:default

memory: 8GiB

portForwards:
  - guestPort: 8001
    hostPort: 8001

provision:
  - mode: system
    script: |
      #!/bin/bash
      set -eux
      apt-get update
      apt-get install -y clang llvm libbpf-dev linux-tools-common \
        linux-tools-$(uname -r) linux-headers-$(uname -r) golang git make
      echo 'GOTOOLCHAIN=auto' >> /etc/environment
